<span class="info-tooltip" onclick='navigator.clipboard.writeText({{ include.text | jsonify }}); const t = this.querySelector(".tooltip-text"); const orig = t.innerText; t.innerText = "Copied!"; setTimeout(() => t.innerText = orig, 2000);'>{% if include.image %}<span class="info-icon" style="cursor: pointer; display: inline-block; width: 1em; height: 1em; vertical-align: -0.125em; background-color: currentColor; -webkit-mask: url('{{ include.image | relative_url }}') no-repeat center; mask: url('{{ include.image | relative_url }}') no-repeat center; -webkit-mask-size: contain; mask-size: contain;"></span>{% else %}<i class="{{ include.icon | default: 'fa fa-clipboard' }} info-icon" style="cursor: pointer;"></i>{% endif %}<span class="tooltip-text">Copy {% if include.name %}{{ include.name }} {% elsif include.image %}{{ include.image | split: '/' | last | remove: '.svg' | capitalize }} {% endif %}install command</span></span>
